<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | inLine Orthodontics</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-xl);
      background: linear-gradient(160deg, var(--color-bg) 0%, var(--color-bg-warm) 100%);
    }
    .error-page__code {
      font-family: var(--font-heading);
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: var(--space-md);
    }
    .error-page h2 {
      margin-bottom: var(--space-md);
    }
    .error-page p {
      color: var(--color-text-light);
      font-size: var(--font-size-lg);
      margin-bottom: var(--space-xl);
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
    .error-page__actions {
      display: flex;
      gap: var(--space-md);
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-page__code">404</div>
      <h2>This page has moved</h2>
      <p>We recently updated our website and this page may have a new address. Let us help you find what you're looking for.</p>
      <div class="error-page__actions">
        <a href="/" class="btn btn--primary btn--lg">Go Home</a>
        <a href="/contact/appointment.html" class="btn btn--outline btn--lg">Schedule Appointment</a>
      </div>
    </div>
  </div>
</body>
</html>
